# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
spring.datasource.username=${DB_USER:authuser}
spring.datasource.password=${DB_PASS:authpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ── Schema init — runs schema.sql then data.sql on startup ───────────────────
logging.level.org.springframework.jdbc.datasource.init=DEBUG
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed origins — override via env var in production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.access-token-expiry-seconds=900
jwt.refresh-token-expiry-seconds=604800
jwt.refresh-token-remember-me-seconds=2592000
